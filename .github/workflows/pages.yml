
# GitHub Pages deployment — generated by CGR v4.2 Phase 4 (PagesBootstrap)
name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"
          bundler-cache: true
          working-directory: docs

      # Sync indicator: record the exact commit the site was built from, so a
      # reader can always tell whether the site matches the repository.
      - name: Write sync indicator
        run: |
          mkdir -p docs/_data
          cat > docs/_data/version.yml <<YML
          commit: "${GITHUB_SHA::7}"
          built: "$(date -u '+%Y-%m-%d %H:%M UTC')"
          manuscript_version: "v2_17_1"
          YML

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Build with Jekyll
        run: bundle exec jekyll build --baseurl "${{ steps.pages.outputs.base_path }}"
        working-directory: docs
        env:
          JEKYLL_ENV: production

      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs/_site

  deploy:
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4

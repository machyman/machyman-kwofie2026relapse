# GitHub Pages configuration
title: Relapse-Driven Bistability in a Model of Gang Dynamics
description: >-
  Reproducibility site for Kwofie, Rodriguez Rodriguez, Wang, Hyman and Kang,
  Mathematical Biosciences and Engineering (MBE-8616).
url: "https://machyman.github.io"
baseurl: "/kwofie2026relapse"

theme: just-the-docs

markdown: kramdown
kramdown:
  input: GFM
  # 'mathjax' is kramdown's built-in engine: it emits \( \) and \[ \], which
  # MathJax 3 reads natively. It requires no gem, no JS runtime, no compiler.
  math_engine: mathjax
  syntax_highlighter: rouge

plugins:
  - jekyll-seo-tag

search_enabled: true
heading_anchors: true
color_scheme: light
aux_links:
  "View on GitHub":
    - "https://github.com/machyman/kwofie2026relapse"

exclude:
  - Gemfile
  - Gemfile.lock
  - vendor
